services:
  - type: web
    name: appdev1final-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DATABASE_URL
        fromDatabase:
          name: appdev1final-db
          property: connectionString
      - key: DB_SSL
        value: false

databases:
  - name: appdev1final-db
    plan: free
    databaseName: appdev1final
    user: appdev1final_user
